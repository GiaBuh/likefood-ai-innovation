services:
    mysql:
        image: mysql:8.0
        container_name: backend-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: likefood
        ports:
            - "3307:3307"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-p${DB_PASSWORD}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: backend-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

  backend:
    build: ./backend
    container_name: likefood-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/likefood?allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      S3_ENABLED: ${S3_ENABLED}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
      AWS_REGION: ${AWS_REGION}
      GEMINI_ENABLED: ${GEMINI_ENABLED}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80}
    ports:
      - "8080:8080"
    backend:
        build: ./backend
        container_name: likefood-backend
        restart: unless-stopped
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_URL: jdbc:mysql://mysql:3306/likefood?allowPublicKeyRetrieval=true&useSSL=false
            DB_USERNAME: root
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            JWT_SECRET: ${JWT_SECRET}
            S3_ENABLED: ${S3_ENABLED}
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            AWS_S3_BUCKET: ${AWS_S3_BUCKET}
            AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
            AWS_REGION: ${AWS_REGION}
            GEMINI_ENABLED: ${GEMINI_ENABLED}
            GEMINI_API_KEY: ${GEMINI_API_KEY}
            CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80}
            TIKTOK_API_KEY: ${TIKTOK_API_KEY}
            TIKTOK_API_URL: ${TIKTOK_API_URL}
        ports:
            - "8080:8080"

    frontend:
        container_name: likefood-frontend
        build:
            context: ./fontend
            args:
                VITE_API_BASE_URL: ""
                VITE_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - "80:80"

volumes:
    mysql_data:
    redis_data:

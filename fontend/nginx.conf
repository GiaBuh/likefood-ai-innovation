server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Tăng lên 50M để thoải mái upload ảnh/video phân tích
    client_max_body_size 50M;

    # Google OAuth callback: trả frontend (React xử lý code rồi POST lên backend)
    location = /auth/google/callback {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API proxy - không cache để dữ liệu mới (sản phẩm, đơn hàng...) hiển thị ngay
    location ~ ^/(auth|products|categories|storage|orders|carts|chat|users|roles|ai|actuator)(/|$) {
        proxy_pass http://backend:8080;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        
        # Header chuẩn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng thời gian chờ lên 300s (5 phút) 
        # Để tránh lỗi 504 Gateway Timeout khi AI phân tích dữ liệu lớn
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Giữ kết nối WebSocket lâu dài (24h)
        proxy_read_timeout 86400;
    }

    # Frontend SPA - index.html không cache để luôn load phiên bản mới
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}